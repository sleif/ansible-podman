- name: Install podman | Set kernel parameters
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/podman.conf
  loop:
    - {name: "net.core.rmem_max", value: "{{ net_core_rmem_max }}"}
    - {name: "net.core.wmem_max", value: "{{ net_core_wmem_max }}"}

