---

container_storage_dir_base: /srv
container_storage_dir_base_local: /srv

podman_rootless: true
# podman_user: "{{ 'podman' if podman_rootless | bool else 'root' }}"
# podman_group: "{{ 'podman' if podman_rootless | bool else 'root' }}"
podman_user: podman
podman_group: podman
podman_user_home: "{{ container_storage_dir_base_local + '/' + podman_user }}"
# podman_subuid_range: "300000:65536"
# podman_subgid_range: "300000:65536"

podman_packages:
  - aardvark-dns
  - bash-completion
  - conmon
  - container-selinux
  - crun
  - fuse-overlayfs
  - netavark
  - podman
  - podman-plugins
  - shadow-utils
  - slirp4netns
  - passt

podman_system_prune: false
podman_system_prune_min_free_gb: 5
podman_system_prune_force: false

podman_log_driver: 'k8s-file'

net_core_rmem_max: "7500000"
net_core_wmem_max: "7500000"

podman_networks: {}
  # podman_custom_network:
  #   name: 'podman_custom_network'
  #   subnet: '10.99.0.0/16'
  #   gateway: '10.99.0.1'
  #   iprange: '10.99.0.128/25'
  # podman_custom_network1:
  #   name: 'podman_custom_network1'
  #   subnet: '10.98.0.0/16'
  #   gateway: '10.98.0.1'
  #   iprange: '10.98.0.128/25'

podman_network_names: []
